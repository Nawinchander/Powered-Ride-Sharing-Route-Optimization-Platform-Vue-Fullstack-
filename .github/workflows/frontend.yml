name: Frontend CI

on:

  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main

jobs:

  frontend:

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    strategy:
      matrix:
        node-version: [20.x]

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - run: npm install

      - run: npm run lint
        continue-on-error: true

      - run: npm test

      - run: npm run build


      